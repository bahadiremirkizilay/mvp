# Test 1: Wider bandpass (30-180 BPM instead of 40-240)
# ============================================================

input:
  use_video_file: false
  video_path: "data/sample_video.mp4"

camera:
  device_id: 0
  fps: 30
  width: 640
  height: 480

rppg:
  window_seconds: 10        # Longer window for stability
  bandpass_low: 0.5         # 30 BPM (was 0.67 = 40 BPM)
  bandpass_high: 3.0        # 180 BPM (was 4.0 = 240 BPM)
  bandpass_order: 4
  min_frames: 64
  ma_window_sec: 0.3

mediapipe:
  max_num_faces: 1
  refine_landmarks: true
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

hrv:
  min_peak_prominence: 0.10
  min_peak_distance_sec: 0.35

visualization:
  update_interval: 7
  figure_dpi: 100
